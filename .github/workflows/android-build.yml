name: Build Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Scanmate AI"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download clean Gradle 8.9
        run: |
          mkdir -p .gradle-ci
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o .gradle-ci/gradle.zip
          unzip -q .gradle-ci/gradle.zip -d .gradle-ci

      - name: Build Debug APK
        run: ./.gradle-ci/gradle-8.9/bin/gradle assembleDebug

      - name: Build Release APK
        run: ./.gradle-ci/gradle-8.9/bin/gradle assembleRelease

      - name: Build Release AAB
        run: ./.gradle-ci/gradle-8.9/bin/gradle bundleRelease

      - name: Upload APK and AAB
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-builds
          path: |
            Scanmate AI/app/build/outputs/apk/debug/*.apk
            Scanmate AI/app/build/outputs/apk/release/*.apk
            Scanmate AI/app/build/outputs/bundle/release/*.aab
